<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1100" width="100%" height="100%" style="background-color: #0f172a; font-family: 'Segoe UI', Arial, sans-serif;">
  <!-- Title Header -->
  <rect x="0" y="0" width="1000" height="100" fill="#1e293b"/>
  <text x="500" y="45" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">Matrix Multiplication &amp; O(d³) Computational Complexity</text>
  <text x="500" y="80" font-size="16" fill="#94a3b8" text-anchor="middle">Visual Proof &amp; First-Principles Guide</text>

  <!-- ==================== SECTION 1: DIMENSION MATCHING ==================== -->
  <g transform="translate(40, 130)">
    <!-- Section Box -->
    <rect x="0" y="0" width="920" height="420" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="30" y="40" font-size="22" font-weight="bold" fill="#38bdf8">PART 1: The Matrix Dimension Matching Rule</text>
    <text x="30" y="70" font-size="15" fill="#cbd5e1">To multiply Matrix A × Matrix B, the INNER numbers must match. The OUTER numbers give the output shape.</text>

    <!-- Formula Display -->
    <g transform="translate(60, 110)">
      <!-- Matrix A Shape Box -->
      <rect x="50" y="20" width="180" height="90" rx="12" fill="#0284c7" fill-opacity="0.2" stroke="#38bdf8" stroke-width="2"/>
      <text x="140" y="55" font-size="18" fill="#93c5fd" text-anchor="middle">Matrix A Shape</text>
      <text x="140" y="90" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">( 2  × <tspan fill="#facc15"> 2 </tspan> )</text>

      <!-- Multiplication Symbol -->
      <text x="265" y="75" font-size="32" font-weight="bold" fill="#cbd5e1" text-anchor="middle">•</text>

      <!-- Matrix B Shape Box -->
      <rect x="300" y="20" width="180" height="90" rx="12" fill="#0284c7" fill-opacity="0.2" stroke="#38bdf8" stroke-width="2"/>
      <text x="390" y="55" font-size="18" fill="#93c5fd" text-anchor="middle">Matrix B Shape</text>
      <text x="390" y="90" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">( <tspan fill="#facc15"> 2 </tspan> ×  1 )</text>

      <!-- Equals Symbol -->
      <text x="515" y="75" font-size="32" font-weight="bold" fill="#cbd5e1" text-anchor="middle">=</text>

      <!-- Output Shape Box -->
      <rect x="550" y="20" width="220" height="90" rx="12" fill="#16a34a" fill-opacity="0.2" stroke="#4ade80" stroke-width="3"/>
      <text x="660" y="55" font-size="18" fill="#86efac" text-anchor="middle">Resulting Output Shape</text>
      <text x="660" y="90" font-size="28" font-weight="bold" fill="#4ade80" text-anchor="middle">( 2 × 1 )  ✓</text>
    </g>

    <!-- Inner Match Highlight -->
    <path d="M 270 230 Q 380 270 490 230" fill="none" stroke="#facc15" stroke-width="3" stroke-dasharray="6,6"/>
    <rect x="300" y="250" width="160" height="40" rx="8" fill="#854d0e" stroke="#facc15" stroke-width="1.5"/>
    <text x="380" y="275" font-size="14" font-weight="bold" fill="#fef08a" text-anchor="middle">INNER MATCH (2 = 2)</text>

    <!-- Explanation Box -->
    <rect x="40" y="310" width="840" height="85" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="60" y="340" font-size="15" fill="#f8fafc"><tspan font-weight="bold" fill="#38bdf8">Concrete Arithmetic:</tspan> Multiplying [2×2] by [2×1] combines 2 rows with 2 weights:</text>
    <text x="60" y="372" font-size="16" font-weight="bold" fill="#facc15">Row 1: (a·w₁ + b·w₂)  |  Row 2: (c·w₁ + d·w₂)  ➔  2 Rows, 1 Column = [ 2 × 1 ]</text>
  </g>

  <!-- ==================== SECTION 2: COMPUTATIONAL COMPLEXITY O(d^3) ==================== -->
  <g transform="translate(40, 580)">
    <!-- Section Box -->
    <rect x="0" y="0" width="920" height="480" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="30" y="40" font-size="22" font-weight="bold" fill="#f43f5e">PART 2: Why Matrix Inversion takes O(d³) Operations</text>
    <text x="30" y="70" font-size="15" fill="#cbd5e1">To invert a matrix (XᵀX)⁻¹ of size (d × d), the computer must eliminate numbers across 3 dimensions.</text>

    <!-- 3D Cube Visual Representation -->
    <g transform="translate(60, 110)">
      <!-- Cube Graphic -->
      <polygon points="40,80 140,40 240,80 140,120" fill="#e11d48" fill-opacity="0.6" stroke="#fb7185" stroke-width="2"/>
      <polygon points="40,80 140,120 140,200 40,160" fill="#be123c" fill-opacity="0.7" stroke="#fb7185" stroke-width="2"/>
      <polygon points="140,120 240,80 240,160 140,200" fill="#9f1239" fill-opacity="0.8" stroke="#fb7185" stroke-width="2"/>
      
      <!-- Cube Dimension Labels -->
      <text x="75" y="130" font-size="14" font-weight="bold" fill="#ffffff">d rows</text>
      <text x="195" y="130" font-size="14" font-weight="bold" fill="#ffffff">d cols</text>
      <text x="255" y="125" font-size="14" font-weight="bold" fill="#facc15">d steps</text>
      
      <text x="140" y="235" font-size="16" font-weight="bold" fill="#f43f5e" text-anchor="middle">Total Calculations = d × d × d = d³</text>
    </g>

    <!-- Comparison Table -->
    <g transform="translate(360, 110)">
      <!-- Table Header -->
      <rect x="0" y="0" width="500" height="35" fill="#0f172a" rx="6"/>
      <text x="120" y="23" font-size="14" font-weight="bold" fill="#94a3b8" text-anchor="middle">Features (d)</text>
      <text x="320" y="23" font-size="14" font-weight="bold" fill="#94a3b8" text-anchor="middle">Operations Required (d³)</text>

      <!-- Row 1 -->
      <rect x="0" y="40" width="500" height="35" fill="#1e293b"/>
      <text x="120" y="63" font-size="15" fill="#f8fafc" text-anchor="middle">d = 2 (Apples, Oranges)</text>
      <text x="320" y="63" font-size="15" font-weight="bold" fill="#4ade80" text-anchor="middle">2³ = 8 ops (Instant!)</text>

      <!-- Row 2 -->
      <rect x="0" y="80" width="500" height="35" fill="#0f172a"/>
      <text x="120" y="103" font-size="15" fill="#f8fafc" text-anchor="middle">d = 100 features</text>
      <text x="320" y="103" font-size="15" fill="#cbd5e1" text-anchor="middle">100³ = 1,000,000 ops</text>

      <!-- Row 3 -->
      <rect x="0" y="120" width="500" height="35" fill="#1e293b"/>
      <text x="120" y="143" font-size="15" fill="#f8fafc" text-anchor="middle">d = 10,000 features</text>
      <text x="320" y="143" font-size="15" font-weight="bold" fill="#facc15" text-anchor="middle">10,000³ = 1 Trillion ops (~17 mins)</text>

      <!-- Row 4 -->
      <rect x="0" y="160" width="500" height="35" fill="#0f172a"/>
      <text x="120" y="183" font-size="15" font-weight="bold" fill="#fb7185" text-anchor="middle">d = 100,000 (Modern AI)</text>
      <text x="320" y="183" font-size="15" font-weight="bold" fill="#f43f5e" text-anchor="middle">100,000³ = 1 Quadrillion ops (~11.5 Days!)</text>
    </g>

    <!-- Bottom Takeaway Box -->
    <rect x="40" y="370" width="840" height="85" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="60" y="400" font-size="16" font-weight="bold" fill="#38bdf8">Why AI Uses Gradient Descent O(d) Instead of Normal Equation O(d³):</text>
    <text x="60" y="430" font-size="15" fill="#f8fafc">Instead of spending 11.5 days inverting a matrix, <tspan fill="#4ade80" font-weight="bold">Gradient Descent</tspan> takes small iterative steps using simple matrix-vector products. It updates 100,000 weights in milliseconds!</text>
  </g>
</svg>
